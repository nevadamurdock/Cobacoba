name: PBRP Build Optimized + AutoPatch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free Disk Space & Setup Swap
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential tar zip curl lib32ncurses5-dev libssl-dev libxml2-utils rsync python3 git

    - name: Build PBRP
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH=~/bin:$PATH
        
        mkdir pbrp && cd pbrp
        repo init --depth=1 -u https://github.com/PitchBlackRecoveryProject/manifest.git -b pbrp-12.1
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle
        
        git clone https://github.com/nevadamurdock/android_device_samsung_a05s -b fox device/samsung/a05s
        
        # --- AUTO PATCH BOARDCONFIG ---
        echo "Applying OOM and VNDK patches to BoardConfig.mk..."
        BOARD_CONFIG="device/samsung/a05s/BoardConfig.mk"
        echo "" >> $BOARD_CONFIG
        echo "# Anti-OOM & VNDK Patches" >> $BOARD_CONFIG
        echo "USE_GOMA := false" >> $BOARD_CONFIG
        echo "BOARD_USE_VNDK_VERSION := current" >> $BOARD_CONFIG
        # Tambahan agar linker tidak terlalu berat (opsional tapi membantu)
        echo "TARGET_MAX_EXE_OBJ_SIZE := 0xFFFFFF" >> $BOARD_CONFIG
        
        # --- START COMPILATION ---
        export ALLOW_MISSING_DEPENDENCIES=true
        export _JAVA_OPTIONS="-Xmx4g"
        
        source build/envsetup.sh
        # Cek ketersediaan lunch target
        lunch pbrp_a05s-eng || lunch twrp_a05s-eng
        
        # Menggunakan -j2 agar stabil dari OOM
        mka pbrp -j2

    - name: Upload to Telegram
      if: success()
      run: |
        cd pbrp/out/target/product/a05s/
        ZIP=$(ls PBRP*.zip | head -n 1)
        IMG=$(ls recovery.img | head -n 1)
        
        # Mengirim ZIP
        curl -F document=@"$ZIP" "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.CHAT_ID }}&caption=✅ PBRP A05s Build Success!%0A📦 File: $ZIP"
        
        # Mengirim IMG (Opsional)
        if [ -f "$IMG" ]; then
          curl -F document=@"$IMG" "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.CHAT_ID }}&caption=📄 Recovery Image (A05s)"
        fi

    - name: Notification on Failure
      if: failure()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
        -d chat_id="${{ secrets.CHAT_ID }}" \
        -d text="❌ Build PBRP Gagal! Silakan cek log di GitHub Actions."
