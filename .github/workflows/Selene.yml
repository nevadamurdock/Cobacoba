name: Build Kernel C-Selene Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Ronald826/xiaomi_kernel_selene
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev libncurses-dev clang-14

      - name: Setup Toolchain (Proton Clang)
        run: |
          mkdir -p bin/clang
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git bin/clang

      - name: Fix Drvgen Error (Patch)
        run: |
          sed -i 's/mv dtboimg.cfg.tmp dtboimg.cfg/-mv dtboimg.cfg.tmp dtboimg.cfg/g' scripts/drvgen/drvgen.mk

      - name: Integrate KernelSU-Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          
          # Manual Hook Integration untuk Kernel 4.14
          # Menyuntikkan panggilam ksu di fs/read_write.c
          sed -i '/ssize_t vfs_read(struct file/a \\nextern int ksu_handle_vfs_read(struct file **, char __user **, size_t *, loff_t *);' fs/read_write.c
          sed -i '/if (!(file->f_mode & FMODE_READ))/a \\tksu_handle_vfs_read(&file, &buf, &count, pos);' fs/read_write.c
          
          sed -i '/ssize_t vfs_write(struct file/a \\nextern int ksu_handle_vfs_write(struct file **, const char __user **, size_t *, loff_t *);' fs/read_write.c
          sed -i '/if (!(file->f_mode & FMODE_WRITE))/a \\tksu_handle_vfs_write(&file, &buf, &count, pos);' fs/read_write.c
          
          # Menyuntikkan panggilam ksu di fs/open.c
          sed -i '/long do_sys_open(int dfd, const char __user \*filename, int flags, umode_t mode)/a \\nextern int ksu_handle_sys_openat2(int *dfd, const char __user **filename, int *flags, umode_t *mode);' fs/open.c
          sed -i '/struct filename \*tmp = getname(filename);/a \\tksu_handle_sys_openat2(&dfd, &filename, &flags, &mode);' fs/open.c

      - name: Integrate SusFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs
          cp susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          cp susfs/kernel_patches/fs/* fs/
          cp susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$(pwd)/bin/clang/bin:$PATH"
          export KBUILD_BUILD_USER="Sam"
          export KBUILD_BUILD_HOST="GusKernel"
          
          make O=out ARCH=arm64 cselene_defconfig
          
          # Inject Konfigurasi
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_NEXT=y" >> out/.config
          echo "CONFIG_SUSFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          echo "CONFIG_OVERLAY_FS=y" >> out/.config
          echo "CONFIG_KPROBES=y" >> out/.config
          echo "CONFIG_KPROBE_EVENTS=y" >> out/.config
          echo "CONFIG_DYNAMIC_FTRACE=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig
          
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            HOSTLDFLAGS="-fuse-ld=lld" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-CSelene-KSU-SusFS
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
