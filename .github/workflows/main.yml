name: PBRP Build Optimized Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free Disk Space & Setup Swap
      run: |
        # Matikan swap lama dan hapus file untuk menghindari error "Text file busy"
        sudo swapoff -a || true
        sudo rm -f /swapfile
        
        # Hapus software bawaan untuk meluangkan ruang disk
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        
        # Buat Swap File 10GB untuk mencegah OOM
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential tar zip curl lib32ncurses5-dev libssl-dev libxml2-utils rsync python3 git

    - name: Setup Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo

    - name: Initialize & Sync PBRP Source
      run: |
        export PATH=~/bin:$PATH
        mkdir pbrp && cd pbrp
        # Menggunakan branch 12.1 untuk Samsung A05s (perangkat modern)
        repo init --depth=1 -u https://github.com/PitchBlackRecoveryProject/manifest.git -b pbrp-12.1
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: Clone Device Tree
      run: |
        cd pbrp
        git clone https://github.com/nevadamurdock/android_device_samsung_a05s -b fox device/samsung/a05s

    - name: Auto-Patch BoardConfig (OOM, VNDK, & Touch Fix)
      run: |
        BOARD_CONFIG="pbrp/device/samsung/a05s/BoardConfig.mk"
        echo "" >> $BOARD_CONFIG
        echo "# --- Automated Patches ---" >> $BOARD_CONFIG
        echo "USE_GOMA := false" >> $BOARD_CONFIG
        echo "BOARD_USE_VNDK_VERSION := current" >> $BOARD_CONFIG
        echo "TARGET_MAX_EXE_OBJ_SIZE := 0xFFFFFF" >> $BOARD_CONFIG
        
        # Flag untuk kompatibilitas touchscreen (Himax, Ilitek, dll)
        echo "TW_INPUT_BLACKLIST := \"hbtp_vm\"" >> $BOARD_CONFIG
        echo "TW_SUPPORT_INPUT_1_2 := true" >> $BOARD_CONFIG
        echo "TW_FILTER_TOUCH_EVENTS := true" >> $BOARD_CONFIG
        echo "Done patching BoardConfig.mk"

    - name: Build PBRP
      run: |
        export PATH=~/bin:$PATH
        cd pbrp
        export ALLOW_MISSING_DEPENDENCIES=true
        # Membatasi heap memory Java agar tidak memicu OOM
        export _JAVA_OPTIONS="-Xmx4g"
        
        source build/envsetup.sh
        # Mencoba target lunch PBRP, jika gagal gunakan target TWRP
        lunch pbrp_a05s-eng || lunch twrp_a05s-eng
        
        # Kompilasi dengan 2 thread agar penggunaan RAM tetap stabil
        mka pbrp -j2

    - name: Upload to Telegram (Success)
      if: success()
      run: |
        cd pbrp/out/target/product/a05s/
        ZIP=$(ls PBRP*.zip | head -n 1)
        IMG=$(ls recovery.img | head -n 1)
        
        # Kirim file ZIP hasil build
        curl -F document=@"$ZIP" "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.CHAT_ID }}&caption=✅ PBRP Samsung A05s Sukses!%0A📦 File: $ZIP"
        
        # Kirim recovery.img jika tersedia
        if [ -f "$IMG" ]; then
          curl -F document=@"$IMG" "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.CHAT_ID }}&caption=📄 Recovery Image (A05s)"
        fi

    - name: Notify on Failure
      if: failure()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
        -d chat_id="${{ secrets.CHAT_ID }}" \
        -d text="❌ Build PBRP Gagal! Periksa log GitHub Actions untuk detail error."
