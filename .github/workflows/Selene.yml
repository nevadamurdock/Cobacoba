name: Build Kernel Selene (KSU-Next + SusFS)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Ronald826/xiaomi_kernel_selene
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev libncurses-dev

      - name: Setup Toolchain (Proton Clang)
        run: |
          mkdir -p bin/clang
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git bin/clang

      - name: Integrate KernelSU-Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Integrate SusFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs
          cp susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          cp susfs/kernel_patches/fs/* fs/
          cp susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$(pwd)/bin/clang/bin:$PATH"
          export KBUILD_BUILD_USER="Sam"
          export KBUILD_BUILD_HOST="GusKernel-Build"
          
          # Gunakan defconfig selene
          make O=out ARCH=arm64 selene_defconfig
          
          # Otomatis aktifkan fitur yang dibutuhkan KSU-Next dan SusFS
          scripts/config --file out/.config \
            -e CONFIG_KSU \
            -e CONFIG_KSU_NEXT \
            -e CONFIG_KSU_SUSFS \
            -e CONFIG_SUSFS \
            -e CONFIG_OVERLAY_FS \
            -e CONFIG_KPROBES \
            -e CONFIG_KPROBE_EVENTS \
            -e CONFIG_DYNAMIC_FTRACE \
            -d CONFIG_KSU_DEBUG
          
          # Mulai proses kompilasi
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Selene-KSU-Next-SusFS
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
