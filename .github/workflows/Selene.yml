name: Build Custom Kernel - Redmi 10 (Selene)

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'Cabang (Branch) Source Kernel'
        required: true
        default: 'lineage-20'

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Lingkungan Kerja & Dependensi
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 libffi-dev

      - name: Clone Toolchain (Proton Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/proton-clang
          # Hapus linker ld internal Proton Clang agar beralih ke linker host Ubuntu (mengatasi konflik .relr.dyn)
          rm -f $GITHUB_WORKSPACE/proton-clang/bin/ld

      - name: Clone Source Kernel
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} https://github.com/selene-devs/android_kernel_xiaomi_selene.git $GITHUB_WORKSPACE/kernel-source

      - name: Integrasi KernelSU-Next (Legacy)
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Integrasi SUSFS Patches (Kernel 4.14)
        run: |
          cd $GITHUB_WORKSPACE
          git clone -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git susfs
          
          cd $GITHUB_WORKSPACE/kernel-source
          
          # 1. Salin file utama SUSFS ke direktori fs kernel source
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/fs/susfs.c fs/
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/fs/sus_su.c fs/
          
          # 2. Salin file header SUSFS ke direktori include/linux kernel source
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/include/linux/sus_su.h include/linux/
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/include/linux/susfs_def.h include/linux/
          
          # 3. Terapkan patch utama SUSFS untuk Kernel 4.14
          if [ -f "$GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch" ]; then
            patch -p1 < $GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch || echo "Patch kernel 4.14 otomatis dilewati."
          fi
          
          # 4. Modifikasi Kode Manual KSU-Next agar Mengenal SUSFS (Menggantikan 10_enable_susfs_for_ksu.patch)
          cd $GITHUB_WORKSPACE/kernel-source/drivers/kernelsu
          
          # Suntik deklarasi SUSFS ke berkas ksu.c internal milik KSU-Next
          if [ -f "ksu.c" ]; then
            sed -i '/extern int ksu_handle_open/a #ifdef CONFIG_KSU_SUSFS\nextern void susfs_init(void);\n#endif' ksu.c
            sed -i '/ksu_core_init();/a #ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif' ksu.c
          fi
          
          # Tambahkan hooks pelacak ekstensi biner pada sys.c atau ksu.c jika diperlukan
          # Langkah ini memaksa integrasi simbol SUSFS masuk ke dalam sistem build KSU-Next
          echo "ccflags-y += -DCONFIG_KSU_SUSFS" >> Makefile
          
      - name: Injeksi Konfigurasi KSU & SUSFS ke Defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          DEFCONFIG_PATH="arch/arm64/configs/selene_defconfig"
          
          # Bersihkan sisa baris kosong di akhir berkas
          echo "" >> $DEFCONFIG_PATH
          
          # Tambahkan konfigurasi KernelSU-Next Non-GKI
          echo "CONFIG_KSU=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_MANUAL_HOOKS=y" >> $DEFCONFIG_PATH
          
          # Tambahkan konfigurasi SUSFS Engine
          echo "CONFIG_SU_SUSFS=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG_PATH

      - name: Proses Kompilasi Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          export PATH="$GITHUB_WORKSPACE/proton-clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Bersihkan sisa build lama
          rm -rf out
          
          # Generasi konfigurasi defconfig
          make O=out selene_defconfig
          
          # Coba kompilasi penuh. Jika gagal, jalankan ulang tanpa multithreading (-j1) untuk menangkap letak error aslinya
          make -j$(nproc --all) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCFLAGS="-Wno-deprecated-declarations -Wno-error" \
            HOSTCXXFLAGS="-Wno-deprecated-declarations -Wno-error" || \
          make O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCFLAGS="-Wno-deprecated-declarations -Wno-error" \
            HOSTCXXFLAGS="-Wno-deprecated-declarations -Wno-error"
            
      - name: Setup AnyKernel3 (Non-GKI Optimization)
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's/block=\/dev\/block\/bootdevice\/by-name\/boot/block=auto/g' AnyKernel3/anykernel.sh
          
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/zImage
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/zImage
          fi
          
          if [ -f kernel-source/out/arch/arm64/boot/dtb ]; then
            cp kernel-source/out/arch/arm64/boot/dtb AnyKernel3/dtb
          fi

      - name: Pengemasan Flashable Zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          zip -r9 ../GusKernel-selene-KSU-Next.zip * -x .git* README.md

      - name: Unggah Hasil Build
        uses: actions/upload-artifact@v4
        with:
          name: GusKernel-selene-Target
          path: GusKernel-selene-KSU-Next.zip
