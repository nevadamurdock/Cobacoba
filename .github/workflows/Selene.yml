name: Build Custom Kernel - Redmi 10 (Selene)

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'Cabang (Branch) Source Kernel'
        required: true
        default: 'lineage-20'

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pasang Dependensi Sistem & Sikat Eror Python3 (xrange)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python-is-python3
          
          # 1. Hubungkan python2 ke mesin python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python2
          
          # 2. TRICK PAMUNGKAS: Buat skrip injeksi global untuk Python
          mkdir -p $HOME/.python
          echo "import builtins" > $HOME/.python/global_patch.py
          echo "if not hasattr(builtins, 'xrange'):" >> $HOME/.python/global_patch.py
          echo "    builtins.xrange = range" >> $HOME/.python/global_patch.py
          
          # 3. Daftarkan skrip ke sistem agar otomatis dieksekusi setiap python berjalan
          echo "PYTHONSTARTUP=$HOME/.python/global_patch.py" >> $GITHUB_ENV
          echo "[✓] Proteksi global xrange berhasil diaktifkan!"
          
      - name: Setup Lingkungan Kerja & Dependensi
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 libffi-dev

      - name: Clone Toolchain (Proton Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/proton-clang
          # Hapus linker ld internal Proton Clang agar beralih ke linker host Ubuntu (mengatasi konflik .relr.dyn)
          rm -f $GITHUB_WORKSPACE/proton-clang/bin/ld

      - name: Clone Source Kernel
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} https://github.com/selene-devs/android_kernel_xiaomi_selene.git $GITHUB_WORKSPACE/kernel-source

      - name: Hard-Patch Total Python3 Compatibility (xrange & bytes)
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          
          # 1. Pastikan symlink python2 aktif
          sudo ln -sf /usr/bin/python3 /usr/bin/python2
          
          if [ -f "scripts/dtc/libfdt/mkdtboimg.py" ]; then
            echo "Memulai operasi Hard-Patch total pada mkdtboimg.py..."
            
            # Perbaikan 1: Ganti xrange menjadi range (Eror sebelumnya)
            sed -i 's/\bxrange\b/range/g' scripts/dtc/libfdt/mkdtboimg.py
            
            # Perbaikan 2: Ubah inisialisasi buffer string kosong menjadi bytes kosong (Menyelesaikan TypeError)
            sed -i "s/dt_entry_buf = ''/dt_entry_buf = b''/g" scripts/dtc/libfdt/mkdtboimg.py
            sed -i "s/buf = ''/buf = b''/g" scripts/dtc/libfdt/mkdtboimg.py
            
            # Perbaikan 3: Ubah mode penulisan berkas dari teks ('w') menjadi biner ('wb')
            sed -i "s/arg_file = open(filename, 'w')/arg_file = open(filename, 'wb')/g" scripts/dtc/libfdt/mkdtboimg.py
            sed -i "s/open(filename, 'w')/open(filename, 'wb')/g" scripts/dtc/libfdt/mkdtboimg.py
            
            # Perbaikan 4: Bersihkan SyntaxWarning tiruan
            sed -i 's/if version is 0:/if version == 0:/g' scripts/dtc/libfdt/mkdtboimg.py
            
            echo "[✓] Patch total mkdtboimg.py berhasil diterapkan!"
          else
            echo "[!] Berkas mkdtboimg.py tidak ditemukan!"
          fi
          
      - name: Integrasi KernelSU (backslashxx Hookless)
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          
          # Clone langsung repositori backslashxx ke folder drivers/kernelsu
          git clone --depth=1 -b master https://github.com/backslashxx/KernelSU.git drivers/kernelsu
          
      - name: Integrasi SUSFS Patches (Kernel 4.14)
        run: |
          cd $GITHUB_WORKSPACE
          git clone -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git susfs
          
          cd $GITHUB_WORKSPACE/kernel-source
          
          # 1. Salin file utama SUSFS ke direktori fs kernel source
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/fs/susfs.c fs/
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/fs/sus_su.c fs/
          
          # 2. Salin file header SUSFS ke direktori include/linux kernel source
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/include/linux/sus_su.h include/linux/
          cp $GITHUB_WORKSPACE/susfs/kernel_patches/include/linux/susfs_def.h include/linux/
          
          # 3. Terapkan patch utama SUSFS untuk komponen dasar Kernel 4.14 (Wajib agar defconfig mengenali SUSFS)
          if [ -f "$GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch" ]; then
            patch -p1 < $GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch
          fi
          
          # CATATAN: Langkah penambalan 10_enable_susfs_for_ksu.patch SENGAJA DIHAPUS 
          # karena konflik struktur kode pada varian KSU Hookless backslashxx.

      - name: Unduh dan Setup KernelSU Hookless (backslashxx)
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          
          # 1. Bersihkan sisa folder lama jika ada
          rm -rf drivers/kernelsu
          
          # 2. Unduh repositori backslashxx
          echo "Mengunduh source KernelSU..."
          git clone https://github.com/backslashxx/KernelSU.git drivers/kernelsu
          
          # 3. FIX OVERWRITE: Salin paksa seluruh isi sub-folder kernel ke luar
          echo "Menata ulang struktur folder KernelSU..."
          cp -r drivers/kernelsu/kernel/* drivers/kernelsu/
          
          # 4. Hapus sub-folder kernel asli agar bersih dan tidak duplikat
          rm -rf drivers/kernelsu/kernel
          
          # 5. Daftarkan folder kernelsu ke dalam drivers/Makefile jika belum ada
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo "obj-y += kernelsu/" >> drivers/Makefile
            echo "[✓] Folder KernelSU berhasil didaftarkan di drivers/Makefile"
          fi
          
          # 6. Daftarkan konfigurasi Kconfig ke dalam drivers/Kconfig jika belum ada
          if ! grep -q "kernelsu" drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            echo "[✓] Kconfig KernelSU berhasil didaftarkan di drivers/Kconfig"
          fi

      - name: Setup dan Aktivasi SUSFS Mandiri
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          
          # 1. Pastikan objek susfs terdaftar di fs/Makefile
          if ! grep -q "susfs.o" fs/Makefile; then
            echo "obj-y += susfs.o" >> fs/Makefile
            echo "[✓] Berkas susfs.o berhasil didaftarkan ke fs/Makefile"
          fi
          
          # 2. Amankan jalur file Kconfig agar tidak memicu error 'can't open file'
          # Kita buat foldernya terlebih dahulu jika belum ada
          mkdir -p fs/susfs
          
          # Jika file Kconfig bawaan susfs berada di luar, kita amankan ke dalam folder fs/susfs/
          if [ -f "fs/Kconfig.susfs" ]; then
            cp fs/Kconfig.susfs fs/susfs/Kconfig
          elif [ -f "fs/susfs.Kconfig" ]; then
            cp fs/susfs.Kconfig fs/susfs/Kconfig
          elif [ ! -f "fs/susfs/Kconfig" ]; then
            # Jika benar-benar tidak ada berkas Kconfig dari source susfs, kita buatkan dummy agar build tidak crash
            echo 'config SUSFS' > fs/susfs/Kconfig
            echo '    bool "SUSFS Support"' >> fs/susfs/Kconfig
          fi
          
          # 3. Daftarkan menu ke fs/Kconfig jika belum terdaftar
          if ! grep -q "fs/susfs/Kconfig" fs/Kconfig; then
            sed -i '/endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig
            echo "[✓] Jalur fs/susfs/Kconfig berhasil dipetakan di fs/Kconfig"
          fi
          
          # 4. Penyelarasan kode sumber utama susfs.c
          if [ -f "fs/susfs/susfs.c" ]; then
            cp fs/susfs/susfs.c fs/susfs.c
          fi
          if [ -d "fs/susfs/include/linux" ]; then
            cp -r fs/susfs/include/linux/* include/linux/ 2>/dev/null || true
          fi
          
      - name: Injeksi Konfigurasi KSU Hookless & SUSFS ke Defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          DEFCONFIG_PATH="arch/arm64/configs/selene_defconfig"
          
          echo "" >> $DEFCONFIG_PATH
          # 1. Ganti nama LOCALVERSION bawaan menjadi nama baru pilihanmu
          # Perintah ini mendeteksi CONFIG_LOCALVERSION apa pun yang ada dan menggantinya
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-Ngentot"/' arch/arm64/configs/selene_defconfig
          
          # Sakelar Utama KernelSU
          echo "CONFIG_KSU=y" >> $DEFCONFIG_PATH
          
          # AKTIFKAN FITUR HOOKLESS (Syscall Table Tampering)
          echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> $DEFCONFIG_PATH
          
          # Konfigurasi SUSFS Engine
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG_PATH
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG_PATH

          echo "[✓] Nama kernel berhasil diubah dan konfigurasi KSU/SUSFS siap!"
          
      - name: Proses Kompilasi Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          export PATH="$GITHUB_WORKSPACE/proton-clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Hapus sisa out lama agar tidak ada cache yang mengganggu
          rm -rf out
          
          # FIX DUPLICATE SYMBOL WIREGUARD: Jaga-jaga agar tidak bentrok lagi
          if [ -d "drivers/net/wireguard" ] && [ -d "net/wireguard" ]; then
            echo "Menjinakkan duplikasi WireGuard..."
            sed -i 's/^obj-$(CONFIG_WIREGUARD).*$/# Modul dinonaktifkan karena duplikat/' net/Makefile
          fi
          
          # Buat defconfig baru
          make O=out selene_defconfig
          
          # Jalankan build cepat (Multi-Thread) terlebih dahulu
          make -j$(nproc --all) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCFLAGS="-Wno-deprecated-declarations -Wno-error" \
            HOSTCXXFLAGS="-Wno-deprecated-declarations -Wno-error" \
            KCFLAGS="-Wno-error -Wno-unknown-warning-option" || \
          (echo "=== BUILD UTAMA GAGAL: MENGISOLASI TITIK EROR DENGAN SINGLE-THREAD ===" && \
          make O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCFLAGS="-Wno-deprecated-declarations -Wno-error" \
            HOSTCXXFLAGS="-Wno-deprecated-declarations -Wno-error" \
            KCFLAGS="-Wno-error -Wno-unknown-warning-option")
            
      - name: Setup AnyKernel3 (Non-GKI Optimization)
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's/block=\/dev\/block\/bootdevice\/by-name\/boot/block=auto/g' AnyKernel3/anykernel.sh
          
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/zImage
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/zImage
          fi
          
          if [ -f kernel-source/out/arch/arm64/boot/dtb ]; then
            cp kernel-source/out/arch/arm64/boot/dtb AnyKernel3/dtb
          fi

      - name: Pengemasan Flashable Zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          zip -r9 ../GusKernel-selene-KSU-Next.zip * -x .git* README.md

      - name: Unggah Hasil Build
        uses: actions/upload-artifact@v4
        with:
          name: GusKernel-selene-Target
          path: GusKernel-selene-KSU-Next.zip
