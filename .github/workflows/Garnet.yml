name: Test ResukiSU+A12+5.10+2.1.0-Garnet

on:
  workflow_dispatch:

env:
  SUSFS_VERSION: "2.1.0"
  KERNEL_SRC: "https://github.com/MiCode/Xiaomi_Kernel_OpenSource"
  KERNEL_BRANCH: "garnet-t-oss"
  DEFCONFIG: "vendor/garnet_GKI.config"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_tool_cache: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm python3 curl git zip libssl-dev tcl

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 $KERNEL_SRC -b $KERNEL_BRANCH kernel-workspace
          
      - name: Setup Greenforce Clang
        run: |
          mkdir -p toolchain
          cd toolchain
          
          # Menggunakan URL aset yang sudah dikoreksi
          CLANG_URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260516/gf-clang-23.0.0-20260516.tar.gz"
          
          echo "Downloading Greenforce Clang dari $CLANG_URL..."
          curl -fLO "$CLANG_URL" || { echo "Gagal mengunduh biner Clang! Periksa koneksi atau validitas rilis."; exit 1; }
          
          # Ekstraksi berkas compiler asli
          tar -xzf gf-clang-23.0.0-20260516.tar.gz
          rm gf-clang-23.0.0-20260516.tar.gz

      - name: Setup ReSukiSU (Automatic Script)
        run: |
          cd kernel-workspace
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
          if [ -d "KernelSU" ]; then
            ln -sf $(pwd)/KernelSU $(pwd)/drivers/kernelsu
          elif [ -d "resukisu" ]; then
            ln -sf $(pwd)/resukisu $(pwd)/drivers/kernelsu
          fi

          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/kernelsu/d' drivers/Makefile
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          echo 'obj-y += kernelsu/' >> drivers/Makefile

          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: Integrate SUSFS Core
        run: |
          cd kernel-workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs_src
          
          SUBLEVEL=$(grep "^SUBLEVEL =" Makefile | awk '{print $3}')
          cp -r susfs_src/kernel_patches/fs/* fs/
          cp -r susfs_src/kernel_patches/include/linux/* include/linux/
          
          # Patching dengan toleransi fuzz 3
          patch -p1 --fuzz=3 < ./susfs_src/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch || true
          
          # Perbaikan manual untuk task_mmu.c jika patch gagal di bagian show_pad
          if [ "$SUBLEVEL" -le 210 ]; then 
            sed -i 's/goto show_pad;/return 0;/g' ./fs/proc/task_mmu.c
            sed -i 's/^show_pad:/ \/\/ show_pad:/g' ./fs/proc/task_mmu.c
          fi

          # Pastikan SUSFS terdefinisi di include
          if [ ! -f "include/linux/susfs.h" ]; then
            cp ../susfs_src/kernel_patches/include/linux/susfs.h include/linux/
          fi
          
      - name: Prepare Config Fragments (ALL TCP Congestions)
        run: |
          cd kernel-workspace
          
          # Bersihkan config TCP bawaan biar gak bentrok di berkas target garnet
          sed -i '/CONFIG_TCP_CONG/d' arch/arm64/configs/$DEFCONFIG
          sed -i '/CONFIG_DEFAULT_TCP_CONG/d' arch/arm64/configs/$DEFCONFIG
          
          # Masukkan konfigurasi kustom ke dalam target vendor defconfig
          cat <<EOF >> arch/arm64/configs/$DEFCONFIG
          CONFIG_LOCALVERSION="-GusKernel"
          CONFIG_LOCALVERSION_AUTO=n
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BIC=y
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_TCP_CONG_HSTCP=y
          CONFIG_TCP_CONG_HYBLA=y
          CONFIG_TCP_CONG_VEGAS=y
          CONFIG_TCP_CONG_SCALABLE=y
          CONFIG_TCP_CONG_LP=y
          CONFIG_TCP_CONG_VENO=y
          CONFIG_TCP_CONG_YEAH=y
          CONFIG_TCP_CONG_ILLINOIS=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_TCP_CONG="westwood"
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_FQ_CODEL=y
          
          # KSU & SUSFS & BBG
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_SUSFS=y
          CONFIG_BBG=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

      - name: Build Kernel (Inline Compilation)
        run: |
          cd kernel-workspace
          set -ex

          # Bersihkan sisa build (jika ada)
          make O=out clean ARCH=arm64
          make O=out mrproper ARCH=arm64

          # Tambahkan toolchain Greenforce ke PATH sistem build
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"

          # Export variabel kompilasi untuk Clang LLVM Standalone
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Menampilkan notifikasi versi asli kernel sebelum konfigurasi di-generate
          echo "============================================="
          echo "MENAMPILKAN VERSI KERNEL YANG SEDANG DIBUAT:"
          make kernelversion
          echo "============================================="

          # Buat konfigurasi awal berdasarkan berkas target garnet_GKI.config
          make O=out $DEFCONFIG ARCH=arm64

          # Proses build kernel utama ke format Image
          make O=out -j$(nproc --all) ARCH=arm64 Image

      - name: Prepare AnyKernel3 Packaging
        run: |
          IMAGE_PATH="kernel-workspace/out/arch/arm64/boot/Image"
          
          if [ -f "$IMAGE_PATH" ]; then
            git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 --depth=1 AnyKernel3
            cp "$IMAGE_PATH" AnyKernel3/Image
            cd AnyKernel3
            sed -i 's/kernel.string=.*/kernel.string=GusKernel ReSukiSU Hybrid/g' banner
            zip -r9 "../GusKernel-Final.zip" * -x .git README.md
          else
            echo "Error: Image tidak ditemukan! Proses kompilasi gagal." && exit 1
          fi

      - name: Upload Final Build
        uses: actions/upload-artifact@v4
        with:
          name: GusKernel-Flashable-Garnet
          path: GusKernel-Final.zip
