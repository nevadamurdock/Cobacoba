name: Build Kernel Selene Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Ronald826/xiaomi_kernel_selene
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev libncurses-dev clang-14

      - name: Setup Toolchain (Proton Clang)
        run: |
          mkdir -p bin/clang
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git bin/clang

      - name: Fix Drvgen Error (Patch)
        run: |
          # Perintah ini akan menambahkan '-' di depan perintah mv agar make mengabaikan jika mv gagal
          # Dan memastikan file tmp dibuat jika belum ada agar perintah cmp tidak error
          sed -i 's/mv dtboimg.cfg.tmp dtboimg.cfg/-mv dtboimg.cfg.tmp dtboimg.cfg/g' scripts/drvgen/drvgen.mk

      - name: Integrate KernelSU-Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Integrate SusFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs
          cp susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          cp susfs/kernel_patches/fs/* fs/
          cp susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$(pwd)/bin/clang/bin:$PATH"
          export KBUILD_BUILD_USER="Sam"
          export KBUILD_BUILD_HOST="GusKernel"
          
          # 1. Buat defconfig awal
          make O=out ARCH=arm64 selene_defconfig
          
          # 2. Inject Konfigurasi KSU & SusFS
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_NEXT=y" >> out/.config
          echo "CONFIG_SUSFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          echo "CONFIG_OVERLAY_FS=y" >> out/.config
          echo "CONFIG_KPROBES=y" >> out/.config
          echo "CONFIG_KPROBE_EVENTS=y" >> out/.config
          echo "CONFIG_DYNAMIC_FTRACE=y" >> out/.config
          
          # 3. Sinkronisasi config
          make O=out ARCH=arm64 olddefconfig
          
          # 4. Proses Kompilasi Utama
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            HOSTLDFLAGS="-fuse-ld=lld" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Selene-KSU-SusFS
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
