name: Build Kernel C-Selene Official KSU
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Ronald826/xiaomi_kernel_selene
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev libncurses-dev clang-14

      - name: Setup Toolchain (Proton Clang)
        run: |
          mkdir -p bin/clang
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git bin/clang

      - name: Ultimate Fix VDSO32 & Drvgen
        run: |
          # Metode Nuklir: Lumpuhkan folder vdso32 sepenuhnya
          rm -rf arch/arm64/kernel/vdso32/*
          echo "obj-y :=" > arch/arm64/kernel/vdso32/Makefile
          echo "all:" >> arch/arm64/kernel/vdso32/Makefile
          echo "clean:" >> arch/arm64/kernel/vdso32/Makefile
          
          # Hapus pemicu vdso_prepare di Makefile arm64
          sed -i 's/prepare: vdso_prepare/prepare:/g' arch/arm64/Makefile || true
          
          # Fix drvgen error
          sed -i 's/mv dtboimg.cfg.tmp dtboimg.cfg/-mv dtboimg.cfg.tmp dtboimg.cfg/g' scripts/drvgen/drvgen.mk

      - name: Integrate KernelSU (Official v0.9.5)
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
          KSU_DIR=$(find drivers -iname "KernelSU" -type d -print -quit || find drivers -iname "kernelsu" -type d -print -quit)
          
          if [ -f "$KSU_DIR/Kbuild" ]; then
            sed -i 's/$(error -- KernelSU: No hooks were defined, please integrate manual hooks in your kernel!.)/@echo -- KernelSU: Manual hooks bypass applied./g' "$KSU_DIR/Kbuild"
          fi
          if [ -f "$KSU_DIR/Makefile" ]; then
            sed -i 's/$(error -- KernelSU: No hooks were defined, please integrate manual hooks in your kernel!.)/@echo -- KernelSU: Manual hooks bypass applied./g' "$KSU_DIR/Makefile"
          fi
          
          echo 'extern int ksu_handle_vfs_read(struct file **, char __user **, size_t *, loff_t *);' >> include/linux/fs.h
          echo 'extern int ksu_handle_vfs_write(struct file **, const char __user **, size_t *, loff_t *);' >> include/linux/fs.h
          echo 'extern int ksu_handle_sys_openat2(int *, const char __user **, int *, umode_t *);' >> include/linux/fs.h
          
          sed -i '/if (!(file->f_mode & FMODE_READ))/a \    ksu_handle_vfs_read(&file, &buf, &count, pos);' fs/read_write.c
          sed -i '/if (!(file->f_mode & FMODE_WRITE))/a \    ksu_handle_vfs_write(&file, &buf, &count, pos);' fs/read_write.c
          sed -i '/struct filename \*tmp = getname(filename);/a \    ksu_handle_sys_openat2(&dfd, &filename, &flags, &mode);' fs/open.c

      - name: Integrate SusFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs
          cp susfs/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          cp susfs/kernel_patches/fs/* fs/
          cp susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch

      - name: Build Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$(pwd)/bin/clang/bin:$PATH"
          export KBUILD_BUILD_USER="Sam"
          export KBUILD_BUILD_HOST="GusKernel"
          
          make O=out ARCH=arm64 cselene_defconfig
          
          {
            echo "CONFIG_VDSO32=n"
            echo "CONFIG_KSU=y"
            echo "CONFIG_SUSFS=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
          } >> out/.config
          
          make O=out ARCH=arm64 olddefconfig
          
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            HOSTLDFLAGS="-fuse-ld=lld" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-CSelene-KSU-Final
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/dtbo.img
