name: PBRP Build - Manifest PB Standard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free Disk Space & Setup Swap
      run: |
        sudo swapoff -a || true
        sudo rm -f /swapfile
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential tar zip curl lib32ncurses5-dev libssl-dev libxml2-utils rsync python3 git

    - name: Setup Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo

    - name: Initialize & Sync Source
      run: |
        export PATH=~/bin:$PATH
        git config --global user.email "hafidz@cachyos"
        git config --global user.name "nevadamurdock"
        
        mkdir pbrp && cd pbrp
        # Pastikan menggunakan -- (double dash)
        repo init --depth=1 -u https://github.com/PitchBlackRecoveryProject/manifest_pb.git -b pb --no-repo-verify
        repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle --optimized-fetch --prune

    - name: Clone Device Tree
      run: |
        cd pbrp
        git clone https://github.com/nevadamurdock/android_device_samsung_a05s -b fox device/samsung/a05s

    - name: Auto-Patch BoardConfig (PBRP Flags)
      run: |
        BOARD_CONFIG="pbrp/device/samsung/a05s/BoardConfig.mk"
        echo -e "\n# --- PBRP Standard Flags ---" >> $BOARD_CONFIG
        echo "PB_OFFICIAL := false" >> $BOARD_CONFIG
        echo "PB_DEVICE_MAINTAINER := \"Agus Tamvan\"" >> $BOARD_CONFIG
        echo "PB_DISABLE_DEFAULT_TREBLE_COMPATIBILITY := true" >> $BOARD_CONFIG
        echo "PB_FORCE_EXTRACT_BINS := true" >> $BOARD_CONFIG
        echo "USE_GOMA := false" >> $BOARD_CONFIG
        echo "BOARD_USE_VNDK_VERSION := current" >> $BOARD_CONFIG
        echo "TARGET_MAX_EXE_OBJ_SIZE := 0xFFFFFF" >> $BOARD_CONFIG
        echo "TW_INPUT_BLACKLIST := \"hbtp_vm\"" >> $BOARD_CONFIG
        echo "TW_SUPPORT_INPUT_1_2 := true" >> $BOARD_CONFIG
        echo "TW_FILTER_TOUCH_EVENTS := true" >> $BOARD_CONFIG

    - name: Build PBRP
      run: |
        export PATH=~/bin:$PATH
        cd pbrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export _JAVA_OPTIONS="-Xmx4g"
        source build/envsetup.sh
        lunch pbrp_a05s-eng || lunch twrp_a05s-eng
        mka pbrp -j2

    - name: Upload to Telegram
      if: success()
      run: |
        cd pbrp/out/target/product/a05s/
        ZIP=$(ls PBRP*.zip | head -n 1)
        curl -F document=@"$ZIP" "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.CHAT_ID }}&caption=✅ PBRP Build Success!"

    - name: Notify Failure
      if: failure()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.CHAT_ID }}" -d text="❌ Build PBRP Gagal! Cek log typo atau koneksi repo."
